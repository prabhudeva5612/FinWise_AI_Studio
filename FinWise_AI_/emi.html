<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinWise AI - EMI Calculator</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><i class="fa-solid fa-brain-circuit"></i> FinWise<span>AI</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="eligibility.html">Eligibility</a></li>
                <li><a href="credit.html">Credit Score</a></li>
                <li><a href="emi.html" class="active">EMI Calculator</a></li>
                <li><a href="tips.html">AI Tips</a></li>
            </ul>
        </div>
    </nav>

    <div class="dashboard-container">
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <a href="index.html"><li><i class="fa-solid fa-house"></i> Home</li></a>
                <a href="eligibility.html"><li><i class="fa-solid fa-check-to-slot"></i> Eligibility Checker</li></a>
                <a href="credit.html"><li><i class="fa-solid fa-chart-line"></i> Credit Analyzer</li></a>
                <a href="emi.html"><li class="active"><i class="fa-solid fa-calculator"></i> EMI Calculator</li></a>
                <a href="tips.html"><li><i class="fa-solid fa-lightbulb"></i> AI Financial Tips</li></a>
            </ul>
        </aside>

        <main class="content-area">
            <div id="userWelcomeSlot"></div>
            <div class="glass-panel fade-in">
                <h2><i class="fa-solid fa-calculator"></i> EMI Calculator</h2>
                <div class="grid-form">
                    <div class="input-group">
                        <label>Principal Loan Amount - P (₹)</label>
                        <input type="number" id="emiAmount" placeholder="e.g. 100000">
                    </div>
                    <div class="input-group">
                        <label>Annual Interest Rate (% P.A.)</label>
                        <input type="number" step="0.01" id="emiRate" placeholder="e.g. 9.5">
                    </div>
                    <div class="input-group">
                        <label>Loan Tenure in Months - N</label>
                        <input type="number" id="emiTenure" placeholder="e.g. 24">
                    </div>
                    <button type="button" class="btn-submit" onclick="calculateEmi()">Calculate EMI</button>
                </div>
                <div id="emiResult" class="result-box hide"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
