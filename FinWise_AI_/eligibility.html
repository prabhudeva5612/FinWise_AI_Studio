<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinWise AI - Eligibility Checker</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><i class="fa-solid fa-brain-circuit"></i> FinWise<span>AI</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="eligibility.html" class="active">Eligibility</a></li>
                <li><a href="credit.html">Credit Score</a></li>
                <li><a href="emi.html">EMI Calculator</a></li>
                <li><a href="tips.html">AI Tips</a></li>
            </ul>
        </div>
    </nav>

    <div class="dashboard-container">
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <a href="index.html"><li><i class="fa-solid fa-house"></i> Home</li></a>
                <a href="eligibility.html"><li class="active"><i class="fa-solid fa-check-to-slot"></i> Eligibility Checker</li></a>
                <a href="credit.html"><li><i class="fa-solid fa-chart-line"></i> Credit Analyzer</li></a>
                <a href="emi.html"><li><i class="fa-solid fa-calculator"></i> EMI Calculator</li></a>
                <a href="tips.html"><li><i class="fa-solid fa-lightbulb"></i> AI Financial Tips</li></a>
            </ul>
        </aside>

        <main class="content-area">
            <div class="glass-panel fade-in">
                <h2><i class="fa-solid fa-check-to-slot"></i> Loan Eligibility Checker</h2>
                <div class="grid-form">
                    <div class="input-group">
                        <label>Applicant Full Name</label>
                        <input type="text" id="name" placeholder="Enter your full name">
                    </div>
                    <div class="input-group">
                        <label>Gross Monthly Salary (₹)</label>
                        <input type="number" id="salary" placeholder="e.g. 120000">
                    </div>
                    <div class="input-group">
                        <label>CIBIL / Credit Score (300-900)</label>
                        <input type="number" id="score" placeholder="e.g. 750">
                    </div>
                    <div class="input-group">
                        <label>Total Existing Monthly EMI Obligations (₹)</label>
                        <input type="number" id="emiInput" placeholder="e.g. 10000">
                    </div>
                    <div class="input-group">
                        <label>Applicant Age (Years)</label>
                        <input type="number" id="age" placeholder="e.g. 23">
                    </div>
                    <button type="button" class="btn-submit" onclick="checkEligibility()">Check Eligibility</button>
                </div>
                <div id="eligibilityResult" class="result-box hide"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
