<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinWise AI - Loan Eligibility Checker</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #070b19 0%, #0f172a 100%); color: #ffffff; min-height: 100vh; display: flex; }
        
        /* Navigation Sidebar */
        nav { width: 260px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-right: 1px rgba(255, 255, 255, 0.05) solid; padding: 40px 20px; display: flex; flex-direction: column; gap: 40px; }
        nav .logo { font-size: 24px; font-weight: 700; letter-spacing: 2px; color: #3b82f6; padding-left: 15px; }
        nav ul { list-style: none; display: flex; flex-direction: column; gap: 15px; }
        nav ul li a { color: #94a3b8; text-decoration: none; font-size: 16px; font-weight: 500; padding: 12px 15px; display: flex; align-items: center; gap: 15px; border-radius: 8px; transition: all 0.3s ease; }
        nav ul li a:hover, nav ul li a.active { color: #ffffff; background: rgba(59, 130, 246, 0.1); border-left: 4px solid #3b82f6; }

        /* Content Area & Glassmorphism Form */
        main { flex: 1; padding: 40px 60px; display: flex; flex-direction: column; gap: 20px; justify-content: center; }
        h2 { font-size: 32px; font-weight: 600; color: #ffffff; margin-bottom: 10px; }
        
        .form-container {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 30px;
            max-width: 600px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px; }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px;
            color: #ffffff; font-size: 16px; outline: none; transition: all 0.3s ease;
        }
        .form-group input:focus, .form-group select:focus { border-color: #3b82f6; background: rgba(255, 255, 255, 0.1); }
        
        .btn-submit {
            width: 100%; background: #3b82f6; color: white; border: none; padding: 14px;
            font-size: 16px; font-weight: 600; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3); transition: all 0.3s ease;
        }
        .btn-submit:hover { background: #2563eb; transform: translateY(-2px); }

        @media (max-width: 768px) { body { flex-direction: column; } nav { width: 100%; } main { padding: 20px; } }
    </style>
</head>
<body>

    <nav>
        <div class="logo">FINAI</div>
        <ul>
            <li><a href="index.html"><i class="fa-solid fa-house"></i> Home</a></li>
            <li><a href="eligibility.html" class="active"><i class="fa-solid fa-file-invoice-dollar"></i> Eligibility</a></li>
            <li><a href="credit-score.html"><i class="fa-solid fa-chart-line"></i> Credit Score</a></li>
            <li><a href="emi.html"><i class="fa-solid fa-calculator"></i> EMI</a></li>
            <li><a href="tips.html"><i class="fa-solid fa-lightbulb"></i> Tips</a></li>
        </ul>
    </nav>

    <main>
        <h2>Loan Eligibility Checker</h2>
        <div class="form-container">
            <form id="eligibilityForm">
                <div class="form-group">
                    <label>Monthly Income ($)</label>
                    <input type="number" id="income" placeholder="e.g. 5000" required>
                </div>
                <div class="form-group">
                    <label>Existing Loan EMIs ($)</label>
                    <input type="number" id="existingEmi" placeholder="e.g. 500" default="0">
                </div>
                <div class="form-group">
                    <label>Requested Loan Amount ($)</label>
                    <input type="number" id="loanAmount" placeholder="e.g. 25000" required>
                </div>
                <div class="form-group">
                    <label>Employment Type</label>
                    <select id="empType">
                        <option value="salaried">Salaried</option>
                        <option value="self-employed">Self Employed</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">Check Eligibility</button>
            </form>
        </div>
    </main>

</body>
</html>
